name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: .NET Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test (unit + integration, exclude load tests)
        run: dotnet test --no-build -c Release --filter "Category!=LoadTest" --verbosity normal

  frontend:
    name: React Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/RetailInventory.Web/package.json

      - name: Install dependencies
        working-directory: src/RetailInventory.Web
        run: npm install

      - name: Type check
        working-directory: src/RetailInventory.Web
        run: npx tsc --noEmit

      - name: Build
        working-directory: src/RetailInventory.Web
        run: npm run build
