services:
  postgres:
    image: postgres:16
    container_name: retail_inventory_postgres
    restart: always
    environment:
      POSTGRES_DB: retail_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  sqledge:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: retail_sqledge
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator
    container_name: retail_servicebus
    depends_on:
      sqledge:
        condition: service_healthy
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "Password123!"
    ports:
      - "5672:5672"
      - "9354:9354"
    volumes:
      - ./servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json

  api:
    build:
      context: .
      dockerfile: RetailInventory.Api/Dockerfile
    container_name: retail_inventory_api
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      servicebus:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=retail_inventory;Username=postgres;Password=postgres
      ServiceBus__ConnectionString: Endpoint=sb://servicebus;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE=;UseDevelopmentEmulator=true;
      ServiceBus__TopicName: retail.events
      ServiceBus__SubscriptionName: analytics-sub
    ports:
      - "8080:8080"

volumes:
  postgres_data:
